<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEME GAME | Найди пару</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="game-container">
    <h1>MEME & GAME MATCH ⚡</h1>
    <p class="subtitle">Переворачивай карточки и ищи совпадения</p>
    
    <div class="stats-box">
      <div class="stat">Сделано ходов: <span id="movesCount">0</span></div>
      <div class="stat">Счёт: <span id="matchesCount">0</span> / 6</div>
    </div>

    <!-- Сетка для 12 карточек -->
    <div class="cards-grid" id="cardsGrid"></div>

    <button id="winBtn" class="restart-btn" onclick="initGame()">Победа! Сыграть ещё раз? 🔥</button>
  </div>

  <script src="./script.js"></script>
</body>
</html>
