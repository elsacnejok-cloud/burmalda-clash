<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BURMALDA CLASH | Neon Edition</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- Анимированный неоновый фон на фоне -->
  <div class="neon-bg-glow"></div>

  <div class="game-container">
    <div class="game-header">
      <h1>BURMALDA CLASH</h1>
      <div class="neon-line"></div>
    </div>
    
    <p class="subtitle">Раскрой тайны Бурмалды. Найди все парные артефакты ⚡</p>
    
    <div class="stats-box">
      <div class="stat">
        <span class="stat-icon">🎮</span> Ходы: <span id="movesCount">0</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-icon">✨</span> Пары: <span id="matchesCount">0</span> / 6
      </div>
    </div>

    <!-- Игровое поле -->
    <div class="cards-grid" id="cardsGrid"></div>

    <button id="winBtn" class="restart-btn" onclick="initGame()">🔥 ПОБЕДА! СЫГРАТЬ ЕЩЕ РАЗ? 🔥</button>
  </div>

  <script src="./script.js"></script>
</body>
</html>
